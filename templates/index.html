<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <main class="container">
      <h1>{{ title }}</h1>
      <p class="subtitle">Add and share your favorite links.</p>

      <section class="panel">
        <form action="/add" method="POST">
          <label for="name">Site Name</label>
          <input type="text" id="name" name="name" required />

          <label for="url">URL</label>
          <input type="url" id="url" name="url" required />

          <button type="submit">Add Link</button>
        </form>
      </section>

      <section class="links-list">
        {% for link in links %}
        <article class="link-card">
          <header class="link-card-header">
            <a href="{{ link.url }}">{{ link.name }}</a>
            <div class="link-actions">
              <a class="button-link edit" href="{{ url_for('edit_link', link_index=loop.index0) }}">Edit</a>
              <form action="{{ url_for('delete_link', link_index=loop.index0) }}" method="POST">
                <button class="delete" type="submit">Delete</button>
              </form>
            </div>
          </header>

          <dl class="link-metadata">
            <div>
              <dt>Title</dt>
              <dd>{{ link.og_title }}</dd>
            </div>
            <div>
              <dt>Description</dt>
              <dd>{{ link.og_description }}</dd>
            </div>
            <div>
              <dt>Image URL</dt>
              <dd>{{ link.og_image }}</dd>
            </div>
          </dl>
        </article>
        {% endfor %}
      </section>
    </main>
  </body>
</html>
